<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- this is for encoding the characters in the webpage -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- this is for compatibility with different browsers -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- this is for making the webpage responsive -->
    <title>Document</title>
</head>







<body>
<!-- class and ids are used to target specific elements with CSS and JavaScript -->



    <h1 id="heading">This is a heading</h1> <!-- this is a heading element with an id attribute -->
  <!--we add id ="headings because we want to target this specific heading -->
  <!-- we didnt just write <h1>heading</h1> because we want to be able to target it with javascript -->

  
  
  
  
  
  
    <p class="paragraph">This is a paragraph.</p> <!-- this is a paragraph element with a class attribute -->
    <p class="paragraph">This is another paragraph.</p> <!-- this is another paragraph element with the same class attribute -->
   
    <!--we add class ="paragraph" because we want to target all paragraphs with the same class -->
    
    
    <!--span is used to group inline elements -->
    <!--span is different from div because it is an inline element -->
    <!--span is required when you want to apply styles or manipulate specific text within a larger element  -->



    <!--div vs span kriye ta eh hunda k
    div jehdi line ch laya j appa ohde te color krdiye ta ohne oh 
    poori line and end takk webpage color krdena
    
    pr j span lavange ohne sirf jo apna content ja text a ohi color krna
    --> 

    <div>
        <span>This is a span element inside a div.</span> <!-- this is a span element inside a div element -->
    </div>
    <!-- this is a comment -->
     <!--div is a block-level element -->
     
     <!--other block elements include h1-h6, p, hr, pre -->
     <!--div creates a block-level container -->
     <!--div is responsive -->
     <!--div responds to different screen sizes-->
     <!-- div is required when you want to create a block-level container -->
      <!-- if we dont use div, we might not be able to create a proper block-level container -->
        <!--we need block level container because they provide a way to group and structure content on a webpage -->
    
    
    
    <ul><!-- this is an unordered list element -->
        <li>List item 1</li> <!-- this is a list item element -->
        <li>List item 2</li> <!-- this is another list item element -->
        <li>List item 3</li> <!-- this is another list item element -->
    </ul>
    <!--ordered list -->
    <ol>
        <li>Ordered list item 1</li>
        <li>Ordered list item 2</li>
        <li>Ordered list item 3</li>
    </ol>

</body>
</html>
